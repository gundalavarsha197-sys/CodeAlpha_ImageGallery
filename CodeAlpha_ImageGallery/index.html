<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>✨ Advanced Image Gallery</h1>

<!-- Dark Mode -->
<button onclick="toggleDarkMode()">🌙 Toggle Mode</button>

<!-- Filter Buttons -->
<div class="buttons">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<!-- Gallery -->
<div class="gallery">
  
  <div class="img-box nature">
    <img src="images/img1.jpg" onclick="openLightbox(0)">
    <span onclick="likeImage(this)">❤️</span>
  </div>

  <div class="img-box city">
    <img src="images/img2.jpg" onclick="openLightbox(1)">
    <span onclick="likeImage(this)">❤️</span>
  </div>

  <div class="img-box nature">
    <img src="images/img3.jpg" onclick="openLightbox(2)">
    <span onclick="likeImage(this)">❤️</span>
  </div>

  <div class="img-box city">
    <img src="images/img4.jpg" onclick="openLightbox(3)">
    <span onclick="likeImage(this)">❤️</span>
  </div>

</div>

<!-- Lightbox -->
<div id="lightbox">
  <span class="close" onclick="closeLightbox()">×</span>
  <img id="lightbox-img">

  <button class="prev" onclick="changeImage(-1)">❮</button>
  <button class="next" onclick="changeImage(1)">❯</button>

  <div class="controls">
    <button onclick="startSlideshow()">▶</button>
    <button onclick="stopSlideshow()">⏸</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
